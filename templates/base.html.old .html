<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Home CMMS{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    table { border-collapse: collapse; width: 100%; margin: 0.5rem 0 1rem; }
    th, td { border: 1px solid #ddd; padding: 0.4rem 0.5rem; font-size: 0.9rem; }
    th { background: #f5f5f5; text-align: left; }
    form { margin: 0.5rem 0 1rem; }
    .stack { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .stack > div { flex: 1 1 320px; }
  </style>
</head>
<body>
<header>
  <h1>Maintenance – Plas Gwernoer</h1>
  <nav>
    <a href="/">Dashboard</a>
 
    <a href="/locations">Locations</a>
    <a href="/assets">Assets</a>
    <a href="/work_orders">Work orders</a>
    <a href="/work_orders/queued">Work Orders Queued</a>
    <a href="/work_orders/history">Work Orders History</a>
    <a href="/users">Users</a>
    <span style="float: right; font-size: 0.85rem; color: #6b7280;">
      {{ request.session.get('display_name', '') }}
      · <a href="/logout">Sign out</a>
    </span>
  </nav>
</header>

<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>

</main>
</body>
</html>
