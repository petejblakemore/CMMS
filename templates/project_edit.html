{% extends "base.html" %}
{% block title %}Edit Project – Home CMMS{% endblock %}
{% block content %}
<h2>Edit Project: {{ project.title }}</h2>

{% if error %}
  <p style="color: #b91c1c; font-weight: 600;">{{ error }}</p>
{% endif %}

<form method="post" style="max-width: 30rem;">

  <div style="margin-bottom: 0.6rem;">
    <label for="title" style="display: block; margin-bottom: 0.2rem;">Title *</label>
    <input type="text" id="title" name="title" value="{{ project.title }}" required style="width: 100%;">
  </div>

  <div style="margin-bottom: 0.6rem;">
    <label for="description" style="display: block; margin-bottom: 0.2rem;">Description</label>
    <textarea id="description" name="description" rows="3" style="width: 100%;">{{ project.description or '' }}</textarea>
  </div>

  <div style="margin-bottom: 0.6rem;">
    <label for="location_id" style="display: block; margin-bottom: 0.2rem;">Location</label>
    <select id="location_id" name="location_id" style="width: 100%;">
      <option value="0">(none)</option>
      {% for loc in locations %}
        <option value="{{ loc.id }}" {% if project.location_id == loc.id %}selected{% endif %}>{{ loc.display_name }}</option>
      {% endfor %}
    </select>
  </div>

  <div style="margin-bottom: 0.6rem;">
    <label for="asset_id" style="display: block; margin-bottom: 0.2rem;">Asset</label>
    <select id="asset_id" name="asset_id" style="width: 100%;">
      <option value="0">(none)</option>
      {% for a in assets %}
        <option value="{{ a.id }}" {% if project.asset_id == a.id %}selected{% endif %}>{{ a.location_name }} – {{ a.name }}</option>
      {% endfor %}
    </select>
  </div>

  <div style="margin-bottom: 0.6rem;">
    <label for="project_status" style="display: block; margin-bottom: 0.2rem;">Status</label>
    <select id="project_status" name="project_status" style="width: 100%;">
      {% for s in ["Planning", "Active", "On Hold", "Complete"] %}
        <option value="{{ s }}" {% if project.status == s %}selected{% endif %}>{{ s }}</option>
      {% endfor %}
    </select>
  </div>

  <div style="margin-top: 1rem; display: flex; gap: 0.5rem; align-items: center;">
    <button class="btn" type="submit">Save changes</button>
    <a class="btn secondary" href="/projects/{{ project.id }}">Cancel</a>
    <a class="btn" href="/projects/{{ project.id }}/delete" style="background: #b91c1c; border-color: #b91c1c; margin-left: auto;">Delete</a>
  </div>

</form>
{% endblock %}
