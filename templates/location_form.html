<!-- templates/location_form.html -->
{% extends "base.html" %} {% block title %}New location – Home CMMS{% endblock
%} {% block content %}
<h2>New location</h2>

<form method="post" style="max-width: 30rem;">

  <div style="margin-bottom: 0.6rem;">
    <label for="name" style="display: block; margin-bottom: 0.2rem;">Name *</label>
    <input type="text" id="name" name="name" required style="width: 100%;">
  </div>

  <div style="margin-bottom: 0.6rem;">
    <label for="parent_id" style="display: block; margin-bottom: 0.2rem;">Parent location</label>
    <select id="parent_id" name="parent_id" style="width: 100%;">
        <option value="0">(none – top level)</option>
        {% for p in parents %}
        <option value="{{ p.id }}">{{ p.display_name }}</option>
            {% endfor %}
        </select>
    </div>

  <div style="margin-bottom: 0.6rem;">
    <label for="description" style="display: block; margin-bottom: 0.2rem;">Description</label>
    <input type="text" id="description" name="description" style="width: 100%;">
  </div>



  <div style="margin-top: 1rem;">
    <button class="btn" type="submit">Create location</button>
    <a class="btn secondary" href="/locations">Cancel</a>
  </div>

</form>

{% endblock %}
