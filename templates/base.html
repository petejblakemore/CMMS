<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Home CMMS{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <h1>Plas Gwernoer</h1>
    <span class="sidebar-subtitle">Maintenance</span>
  </div>

  <nav class="sidebar-nav">
    <a href="/" class="nav-item">
      <span class="nav-icon">&#9632;</span> Dashboard
    </a>
    <a href="/locations" class="nav-item">
      <span class="nav-icon">&#9873;</span> Locations
    </a>
    <a href="/assets" class="nav-item">
      <span class="nav-icon">&#9881;</span> Assets
    </a>
    <a href="/work_orders/board" class="nav-item">
      <span class="nav-icon">&#9638;</span> Board
    </a>
    <div class="nav-group-label">Work Orders</div>
    <a href="/work_orders" class="nav-item">
      <span class="nav-icon">&#9998;</span> All Work Orders
    </a>

    <a href="/work_orders/history" class="nav-item">
      <span class="nav-icon">&#9201;</span> History
    </a>

    <div class="nav-group-label">Maintenance</div>
    <a href="/maintenance" class="nav-item">
      <span class="nav-icon">&#9211;</span> Planned Maintenance
    </a>

    <div class="nav-group-label">Admin</div>
    <a href="/users" class="nav-item">
      <span class="nav-icon">&#9823;</span> Users
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="sidebar-user">
      {{ request.session.get('display_name', '') }}
    </div>
    <a href="/logout" class="nav-item nav-signout">Sign out</a>
  </div>
</aside>

<div class="main-content">
  <header class="top-bar">
    <h2 class="page-title">{% block page_title %}{% endblock %}</h2>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>
</div>

</body>
</html>
