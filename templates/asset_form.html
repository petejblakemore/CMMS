<!-- templates/asset_form.html -->
{% extends "base.html" %} {% block title %}New Asset – Home CMMS{% endblock %}
{% block content %}
<h2>New Asset</h2>

<form method="post" action="/assets/new">
    <input
        type="hidden"
        name="csrftoken"
        value="{{ request.state.csrftoken }}"
    />

    <div class="form-row">
        <label for="name">Name *</label>
        <input type="text" id="name" name="name" required />
    </div>

    <div class="form-row">
        <label for="parent_asset_id">Parent asset</label>
        <select id="parent_asset_id" name="parent_asset_id">
      <option value="0">(none — top level)</option>
      {% for pa in parent_assets %}
        <option value="{{ pa.id }}">{{ pa.name }}</option>
      {% endfor %}
    </select>
    </div>

    <div class="form-row">
        <label for="location_id">Location *</label>
        <select id="location_id" name="location_id" required>
            <option value="">-- Select --</option>
            {% for loc in locations %}
            <option value="{{ loc.id }}">{{ loc.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-row">
        <label for="category">Category</label>
        <input list="category_list" id="category" name="category" />
        <datalist id="category_list">
            {% for cat in categories %} {% if cat %}
            <option value="{{ cat }}"></option>
            {% endif %} {% endfor %}
        </datalist>
    </div>

    <div class="form-row">
      <label for="type">Type</label>
      <input list="type_list" id="type" name="asset_type">
      <datalist id="type_list">
        {% for t in types %}
          {% if t %}<option value="{{ t }}"></option>{% endif %}
        {% endfor %}
      </datalist>
    </div>

    <div class="form-row">
        <label for="status">Status</label>
        <select id="status" name="asset_status">
            <option value="Running" selected>Running</option>
            <option value="Needs Maintenance">Needs Maintenance</option>
            <option value="Out of Service">Out of Service</option>
        </select>
    </div>

    <div class="form-row">
        <label for="manufacturer">Manufacturer</label>
        <input type="text" id="manufacturer" name="manufacturer" />
    </div>

    <div class="form-row">
        <label for="model">Model</label>
        <input type="text" id="model" name="model" />
    </div>

    <div class="form-row">
        <label for="serial_number">Serial number</label>
        <input type="text" id="serial_number" name="serial_number" />
    </div>

    <div class="form-row">
        <label for="purchase_date">Purchase date</label>
        <input type="date" id="purchase_date" name="purchase_date" />
    </div>

    <div class="form-row">
        <label for="warranty_end_date">Warranty end</label>
        <input type="date" id="warranty_end_date" name="warranty_end_date" />
    </div>
    <div class="form-row">
        <label for="cost">Cost</label>
        <input type="number" id="cost" name="cost" step="0.01" placeholder="0.00">
    </div>

    <div class="form-row">
        <label for="vendor">Vendor</label>
        <input type="text" id="vendor" name="vendor">
    </div>
    

    <div class="form-row">
        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" rows="3"></textarea>
    </div>

    <div class="form-actions">
        <button class="btn" type="submit">Save asset</button>
        <a class="btn secondary" href="/assets">Cancel</a>
    </div>
</form>
{% endblock %}
